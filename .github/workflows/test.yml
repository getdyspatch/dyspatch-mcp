name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      DYSPATCH_API_KEY: ${{ secrets.TEST_DYSPATCH_API_KEY }}
      WORKSPACE_ID: ${{ secrets.TEST_WORKSPACE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
